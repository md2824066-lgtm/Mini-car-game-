<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Mini Car Game</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root { --primary: #00f7ff; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background:#000;
        color:white;
        font-family:'Press Start 2P',cursive;
        height:100vh;
        overflow:hidden;
        touch-action:manipulation;
    }

    #game-container {
        position:fixed;
        inset:0;
        width:100%;
        height:100%;
        background:#111;
        overflow:hidden;
    }

    #game-canvas {
        display:block;
        width:100%;
        height:100%;
        image-rendering:pixelated;
    }

    .screen {
        position:absolute;
        inset:0;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        background:rgba(10,10,31,0.92);
        z-index:100;
        transition:opacity 0.7s ease;
    }

    .hidden { opacity:0; pointer-events:none; }

    #title-box {
        background:linear-gradient(90deg,#ff00cc,#00ffff,#ff00cc);
        background-size:300% 300%;
        -webkit-background-clip:text;
        background-clip:text;
        color:transparent;
        font-size:clamp(36px,9vw,64px);
        text-shadow:0 0 30px #fff,0 0 60px #00f7ff;
        padding:20px 40px;
        border:6px solid #fff;
        border-radius:24px;
        margin-bottom:24px;
        animation:gradient 5s ease infinite, glow 2s ease-in-out infinite alternate;
    }

    #creator {
        font-size:clamp(16px,4vw,22px);
        margin:20px 0 40px;
        color:#00ffcc;
        text-shadow:0 0 15px #00ffcc;
    }

    .btn {
        font-family:'Press Start 2P',cursive;
        font-size:clamp(20px,5vw,32px);
        padding:16px 48px;
        border:none;
        border-radius:50px;
        cursor:pointer;
        text-transform:uppercase;
        letter-spacing:3px;
        transition:all 0.18s;
        margin:12px 0;
    }

    .start-btn { background:linear-gradient(45deg,#00ff88,#00ccff); color:#000; box-shadow:0 12px 0 #008844,0 0 40px #00ff88; }
    .start-btn:active { transform:translateY(6px); box-shadow:0 6px 0 #008844; }

    .restart-btn { background:linear-gradient(45deg,#ff8800,#ff0088); color:white; box-shadow:0 12px 0 #aa4400,0 0 40px #ff8800; }
    .restart-btn:active { transform:translateY(6px); box-shadow:0 6px 0 #aa4400; }

    .home-btn { background:linear-gradient(45deg,#6666ff,#aa88ff); color:white; box-shadow:0 12px 0 #4444aa,0 0 40px #8888ff; }
    .home-btn:active { transform:translateY(6px); box-shadow:0 6px 0 #4444aa; }

    #hud {
        position:absolute;
        top:2vh;
        left:0; right:0;
        text-align:center;
        font-size:clamp(20px,5vw,32px);
        font-weight:bold;
        color:#00ffff;
        text-shadow:3px 3px 0 #000,0 0 20px #00ffff;
        z-index:50;
        pointer-events:none;
    }

    #level-indicator {
        position:absolute;
        top:8vh;
        left:0; right:0;
        text-align:center;
        font-size:clamp(16px,4vw,24px);
        color:#ffcc00;
        text-shadow:2px 2px 0 #000;
        opacity:0.9;
        z-index:50;
        pointer-events:none;
    }

    @keyframes gradient { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes glow { from{text-shadow:0 0 20px #fff,0 0 40px var(--primary)} to{text-shadow:0 0 40px #fff,0 0 80px var(--primary)} }
    @keyframes gameOverPulse { from{transform:scale(1);opacity:1} to{transform:scale(1.08);opacity:0.85} }
</style>
</head>
<body>

<div id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="hud">SCORE <span id="score-text">00000</span></div>
    <div id="level-indicator">LEVEL <span id="level-text">1</span></div>

    <!-- MENU -->
    <div id="menu-screen" class="screen">
        <div id="title-box">MINI CAR</div>
        <div style="font-size:clamp(14px,3.5vw,18px);margin-bottom:16px;color:#ffcc00;text-shadow:0 0 10px #ffcc00;">
            ENDLESS HIGHWAY RUNNER
        </div>
        <div id="creator">Creator: Apon</div>
        <button class="btn start-btn" onclick="startGame()">START GAME</button>
        <div style="margin-top:40px;font-size:clamp(14px,3vw,16px);opacity:0.7;">
            ← SWIPE LEFT / RIGHT →
        </div>
    </div>

    <!-- GAME OVER -->
    <div id="game-over-screen" class="screen hidden">
        <h1 style="font-size:clamp(48px,12vw,90px);color:#ff0044;text-shadow:0 0 40px #ff0044;margin-bottom:30px;animation:gameOverPulse 1.8s infinite alternate;">
            GAME OVER
        </h1>
        <div style="font-size:clamp(22px,5vw,32px);margin:20px 0;">
            SCORE: <span id="final-score" style="color:#00ffff;">00000</span>
        </div>
        <button class="btn restart-btn" onclick="restartGame()">RESTART</button>
        <button class="btn home-btn" onclick="goToHome()">HOME</button>
    </div>
</div>

<script>
// ────────────────────────────────────────────────
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

let WIDTH, HEIGHT;
function resize() {
    WIDTH = canvas.width = window.innerWidth;
    HEIGHT = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ──────────────────────────────────────────────── Game constants
const ROAD_WIDTH = Math.min(420, WIDTH * 0.75);
const ROAD_LEFT  = (WIDTH - ROAD_WIDTH) / 2;
const ROAD_RIGHT = ROAD_LEFT + ROAD_WIDTH;

const LANE_COUNT = 3;
const LANE_WIDTH = ROAD_WIDTH / LANE_COUNT;
const LANE_CENTER = [];
for(let i=0; i<LANE_COUNT; i++) LANE_CENTER[i] = ROAD_LEFT + (i + 0.5) * LANE_WIDTH;

const CAR_W = Math.min(68, LANE_WIDTH * 0.82);
const CAR_H = CAR_W * 1.9;
const PLAYER_Y = HEIGHT * 0.82;

// ──────────────────────────────────────────────── Variables
let gameState = 'menu'; // playing, over
let score = 0;
let level = 1;
let baseSpeed = 5;
let playerLane = 1;
let playerX = LANE_CENTER[1];
let playerTargetX = playerX;

let traffic = [];
let roadOffset = 0;
let frame = 0;
let lastSpawnFrame = 0;

let touchStartX = 0;

// Audio
let audioCtx;
let engineOsc, engineGain;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSwipe() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = 900;
    g.gain.setValueAtTime(0.35, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.14);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.14);
}

function playCrash() {
    if (!audioCtx) return;
    const noise = audioCtx.createBufferSource();
    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.7, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 700;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.9, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.75);
    noise.connect(filter).connect(gain).connect(audioCtx.destination);
    noise.start();
}

function startEngine() {
    if (engineOsc) return;
    engineOsc = audioCtx.createOscillator();
    engineGain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 100;
    filter.type = 'lowpass'; filter.frequency.value = 550;
    engineGain.gain.value = 0.11;
    engineOsc.connect(filter).connect(engineGain).connect(audioCtx.destination);
    engineOsc.start();
}

function updateEngine() {
    if (!engineOsc) return;
    const targetFreq = 90 + (baseSpeed + level * 1.8) * 11;
    engineOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.08);
}

function stopEngine() {
    if (engineOsc) { engineOsc.stop(); engineOsc = null; }
}

// ──────────────────────────────────────────────── Draw functions
function drawRoad() {
    const grad = ctx.createLinearGradient(0,0,0,HEIGHT);
    grad.addColorStop(0, '#0a1a3a');
    grad.addColorStop(1, '#000814');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,WIDTH,HEIGHT);

    ctx.fillStyle = '#0d3a1a';
    ctx.fillRect(0,0,ROAD_LEFT,HEIGHT);
    ctx.fillRect(ROAD_RIGHT,0,WIDTH-ROAD_RIGHT,HEIGHT);

    ctx.fillStyle = '#222';
    ctx.fillRect(ROAD_LEFT,0,ROAD_WIDTH,HEIGHT);

    ctx.fillStyle = '#eee';
    ctx.fillRect(ROAD_LEFT+3,0,9,HEIGHT);
    ctx.fillRect(ROAD_RIGHT-12,0,9,HEIGHT);

    const dashH = 50, gap = 40, period = dashH + gap;
    roadOffset = (roadOffset + baseSpeed * 1.1) % period;

    ctx.fillStyle = '#ffffff';
    for (let i = -3; i < 20; i++) {
        let y = i * period - roadOffset;
        for (let lane = 0; lane < LANE_COUNT-1; lane++) {
            const cx = ROAD_LEFT + (lane + 1) * LANE_WIDTH;
            ctx.fillRect(cx - 4, y, 8, dashH);
        }
    }

    ctx.fillStyle = 'rgba(255,220,80,0.7)';
    for (let i = -3; i < 20; i++) {
        let y = i * period - roadOffset + 12;
        const cx = ROAD_LEFT + (LANE_COUNT/2) * LANE_WIDTH;
        ctx.fillRect(cx - 3, y, 6, dashH - 20);
    }
}

function drawCar(x, y, color, isPlayer = false) {
    ctx.save();
    ctx.translate(x, y);

    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 15;
    ctx.shadowOffsetY = 10;

    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath(); ctx.arc(-CAR_W*0.36, CAR_H*0.28, CAR_W*0.18, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( CAR_W*0.36, CAR_H*0.28, CAR_W*0.18, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-CAR_W*0.36,-CAR_H*0.24, CAR_W*0.18, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( CAR_W*0.36,-CAR_H*0.24, CAR_W*0.18, 0, Math.PI*2); ctx.fill();

    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(-CAR_W*0.48, -CAR_H*0.45);
    ctx.lineTo( CAR_W*0.48, -CAR_H*0.45);
    ctx.lineTo( CAR_W*0.48,  CAR_H*0.35);
    ctx.lineTo(-CAR_W*0.48,  CAR_H*0.35);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.moveTo(-CAR_W*0.34, -CAR_H*0.35);
    ctx.lineTo( CAR_W*0.34, -CAR_H*0.35);
    ctx.lineTo( CAR_W*0.40, -CAR_H*0.05);
    ctx.lineTo(-CAR_W*0.40, -CAR_H*0.05);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = isPlayer ? '#88ddff' : '#aaffff';
    ctx.fillRect(-CAR_W*0.30, -CAR_H*0.30, CAR_W*0.60, CAR_H*0.16);

    if (isPlayer) {
        ctx.fillStyle = '#ff2244';
        ctx.fillRect(-CAR_W*0.42, CAR_H*0.24, CAR_W*0.13, CAR_H*0.11);
        ctx.fillRect( CAR_W*0.29, CAR_H*0.24, CAR_W*0.13, CAR_H*0.11);
    } else {
        ctx.shadowColor = '#ffff88'; ctx.shadowBlur = 20;
        ctx.fillStyle = '#ffff66';
        ctx.fillRect(-CAR_W*0.42, CAR_H*0.24, CAR_W*0.14, CAR_H*0.09);
        ctx.fillRect( CAR_W*0.28, CAR_H*0.24, CAR_W*0.14, CAR_H*0.09);
        ctx.shadowBlur = 0;
    }

    ctx.restore();
}

// ──────────────────────────────────────────────── Update
function update() {
    if (gameState !== 'playing') return;

    frame++;
    roadOffset += baseSpeed * 1.1;

    const playerRelativeSpeed = 4 + level * 1.4;
    const oncomingSpeed = playerRelativeSpeed + level * 2.2;

    // Player movement
    playerX += (playerTargetX - playerX) * 0.32;

    // Score & level
    score += playerRelativeSpeed * 0.12;
    document.getElementById('score-text').textContent = Math.floor(score).toString().padStart(5, '0');

    const targetLevel = 1 + Math.floor(score / 800);
    if (targetLevel > level) {
        level = targetLevel;
        document.getElementById('level-text').textContent = level;
    }

    // Spawn traffic
    const spawnInterval = Math.max(18, 45 - level * 3.5);
    if (frame - lastSpawnFrame > spawnInterval) {
        const lane = Math.floor(Math.random() * LANE_COUNT);
        const colors = ['#ff3366','#44ff99','#3366ff','#ffaa00','#aa44ff','#ff6644'];
        traffic.push({
            x: LANE_CENTER[lane],
            y: -CAR_H - 40,
            lane,
            color: colors[Math.floor(Math.random()*colors.length)]
        });
        lastSpawnFrame = frame;
    }

    // Update traffic + collision → game over on any crash
    for (let i = traffic.length - 1; i >= 0; i--) {
        const c = traffic[i];
        c.y += oncomingSpeed;

        if (c.lane === playerLane) {
            const dy = Math.abs(c.y - PLAYER_Y);
            if (dy < CAR_H * 0.75) {
                // CRASH → immediate game over
                traffic.splice(i, 1);
                playCrash();
                gameOver();
                return;
            }
        }

        if (c.y > HEIGHT + 80) traffic.splice(i, 1);
    }

    updateEngine();
}

function gameOver() {
    gameState = 'over';
    stopEngine();
    playCrash();

    const final = Math.floor(score);
    document.getElementById('final-score').textContent = final.toString().padStart(5, '0');

    setTimeout(() => {
        document.getElementById('game-over-screen').classList.remove('hidden');
    }, 400);
}

// ──────────────────────────────────────────────── Render
function render() {
    ctx.clearRect(0, 0, WIDTH, HEIGHT);
    drawRoad();

    traffic.forEach(c => drawCar(c.x, c.y, c.color, false));
    drawCar(playerX, PLAYER_Y, '#00eeff', true);

    // Motion lines at high level
    if (level >= 3) {
        ctx.strokeStyle = 'rgba(255,255,255,0.22)';
        ctx.lineWidth = 3;
        for (let i = 0; i < 8; i++) {
            const x = ROAD_LEFT + 30 + i * (ROAD_WIDTH / 7);
            ctx.beginPath();
            ctx.moveTo(x, HEIGHT * 0.55);
            ctx.lineTo(x - (level * 3), HEIGHT);
            ctx.stroke();
        }
    }
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

// ──────────────────────────────────────────────── Controls
function changeLane(delta) {
    if (gameState !== 'playing') return;
    let nl = playerLane + delta;
    if (nl < 0 || nl >= LANE_COUNT) return;
    playerLane = nl;
    playerTargetX = LANE_CENTER[nl];
    playSwipe();
}

// ──────────────────────────────────────────────── Game flow
function startGame() {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('game-over-screen').classList.add('hidden');

    resetGame();
    gameState = 'playing';
    startEngine();

    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(()=>{});
    }
}

function resetGame() {
    score = 0;
    level = 1;
    baseSpeed = 5;
    playerLane = 1;
    playerX = LANE_CENTER[1];
    playerTargetX = playerX;
    traffic = [];
    roadOffset = 0;
    frame = 0;
    lastSpawnFrame = 0;
    document.getElementById('score-text').textContent = '00000';
    document.getElementById('level-text').textContent = '1';
}

function restartGame() {
    document.getElementById('game-over-screen').classList.add('hidden');
    resetGame();
    gameState = 'playing';
    startEngine();
}

function goToHome() {
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('menu-screen').classList.remove('hidden');
    gameState = 'menu';
    stopEngine();
    resetGame();
}

// ──────────────────────────────────────────────── Input
canvas.addEventListener('touchstart', e => {
    if (gameState !== 'playing') return;
    touchStartX = e.changedTouches[0].screenX;
    e.preventDefault();
}, {passive:false});

canvas.addEventListener('touchend', e => {
    if (gameState !== 'playing') return;
    const dx = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(dx) > 50) changeLane(dx > 0 ? 1 : -1);
});

window.addEventListener('keydown', e => {
    if (gameState !== 'playing') return;
    if (e.key === 'ArrowLeft') changeLane(-1);
    if (e.key === 'ArrowRight') changeLane(1);
});

// Start
gameLoop();
</script>
</body>
</html>
